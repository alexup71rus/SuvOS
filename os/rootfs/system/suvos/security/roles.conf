# SuvOS role policy.
# This file is embedded into the read-only system image.
# The secret itself is never embedded; only the hash file below is copied in.
# Capabilities support exact values and scoped wildcards such as app.demo.*.

default_role=setup
root_role=root
root_hash_file=/system/suvos/security/root-bootstrap.sha256
user_creation=deferred-ui

role.setup.permissions=status.read,role.read,apps.list,auth.status,auth.root,system.power
role.root.permissions=*
